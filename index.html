
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRDORKS // BRUTAL AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg-color: #FFDE59;
          --text-color: #000000;
          --accent-pink: #FF00FF;
          --accent-cyan: #00FFFF;
          --border-thickness: 4px;
          --shadow-offset: 8px;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(#000000 2px, transparent 2px);
            background-size: 32px 32px;
            background-attachment: fixed;
        }

        /* Scanline effect for extra brutal aesthetic */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 118, 0.02));
            z-index: 1000;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* BRUTAL CLASSES */
        .brutal-card {
            background: #FFFFFF;
            border: var(--border-thickness) solid #000000;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px 0px #000000;
            transition: all 0.15s ease;
        }

        .brutal-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px 0px #000000;
        }

        .brutal-button {
            background: #FFFFFF;
            border: var(--border-thickness) solid #000000;
            box-shadow: 6px 6px 0px 0px #000000;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.1s ease;
        }

        .brutal-button:hover:not(:disabled) {
            background: var(--accent-cyan);
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px 0px #000000;
        }

        .brutal-button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #000000;
        }

        .brutal-input {
            background: #FFFFFF;
            border: var(--border-thickness) solid #000000;
            box-shadow: inset 4px 4px 0px 0px #000000;
            padding: 1.5rem;
            width: 100%;
            font-weight: 800;
            outline: none;
        }

        .brutal-tag {
            background: var(--accent-pink);
            color: #000;
            border: 2px solid #000;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 800;
            box-shadow: 2px 2px 0px #000;
        }

        /* Animations */
        @keyframes glitch {
          0% { transform: skew(0deg); background: var(--accent-pink); }
          20% { transform: skew(10deg); background: var(--accent-cyan); }
          40% { transform: skew(-10deg); background: #fff; }
          60% { transform: skew(5deg); background: var(--accent-pink); }
          80% { transform: skew(-5deg); background: var(--accent-cyan); }
          100% { transform: skew(0deg); background: #fff; }
        }
        
        .loading-glitch {
            width: 80px;
            height: 80px;
            border: 4px solid #000;
            animation: glitch 0.3s infinite alternate;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 14px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--bg-color); border: 2px solid #000; }
    </style>
